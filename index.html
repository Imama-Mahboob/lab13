<!DOCTYPE html>
<html>
<head>
  <title>Simple Input App</title>
</head>
<body>
  <h1>Enter Your Data</h1>
  <form id="dataForm">
    <label>Field 1: <input type="text" id="field1" required></label><br><br>
    <label>Field 2: <input type="text" id="field2" required></label><br><br>
    <button type="submit">Submit</button>
  </form>

  <h2>Stored Entries</h2>
  <ul id="entries"></ul>

  <script>
    async function loadEntries() {
      const res = await fetch('/entries');
      const data = await res.json();
      const list = document.getElementById('entries');
      list.innerHTML = '';
      data.forEach(item => {
        const li = document.createElement('li');
        li.textContent = `${item.field1} - ${item.field2}`;
        list.appendChild(li);
      });
    }

    document.getElementById('dataForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const field1 = document.getElementById('field1').value;
      const field2 = document.getElementById('field2').value;
      await fetch('/add', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ field1, field2 })
      });
      document.getElementById('field1').value = '';
      document.getElementById('field2').value = '';
      loadEntries();
    });

    loadEntries();
  </script>
</body>
</html>
